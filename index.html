<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ZIP Codes Florida | Territorios y Rutas - Optimizado</title>
    <!-- Leaflet CSS + JS -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://tile.openstreetmap.org">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #eef2f7; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: linear-gradient(135deg, #0b3b2f, #1a5c6e); color: white; padding: 0.5rem 1rem; flex-shrink: 0; }
        .header h1 { font-size: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        
        .route-controls { background: rgba(0,0,0,0.85); padding: 0.4rem; border-radius: 16px; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: space-between; }
        .route-selectors { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .route-selectors select, .route-selectors button { padding: 0.25rem 0.5rem; border-radius: 20px; border: none; font-size: 0.65rem; font-weight: 500; cursor: pointer; background: white; }
        .route-selectors button { background: #f39c12; color: #1e2a3e; transition: 0.1s; }
        .route-selectors button:active { transform: scale(0.97); }
        .clear-btn { background: #e74c3c !important; color: white !important; }
        .clear-btn:active { background: #c0392b !important; }
        .route-info { background: #2c3e2f; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.6rem; font-weight: bold; white-space: nowrap; overflow-x: auto; max-width: 35%; }
        .route-info span { color: #f39c12; }
        
        .main-container { display: flex; flex-direction: row; gap: 0.6rem; padding: 0.6rem; flex: 1; min-height: 0; overflow: hidden; }
        .map-wrapper { flex: 1.5; min-width: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 2px solid white; }
        #map { width: 100%; height: 100%; background: #cbdae5; }
        .results-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 2px solid white; overflow: hidden; }
        .info-card { padding: 0.5rem; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .info-card h3 { font-size: 0.75rem; color: #1e5f55; margin-bottom: 4px; display: flex; justify-content: space-between; }
        
        #zipCodeList { flex: 1; overflow-y: auto; padding-right: 4px; -webkit-overflow-scrolling: touch; }
        .city-zip-section { margin-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
        .city-header { font-weight: 800; font-size: 0.7rem; color: #c4450c; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
        .city-color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .zip-grid { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 2px; }
        .zip-badge { padding: 0.2rem 0.5rem; border-radius: 30px; font-size: 0.55rem; font-weight: 600; font-family: monospace; cursor: pointer; transition: all 0.1s ease; background: #f0f4f9; }
        .zip-badge:active { transform: scale(0.96); background: #e0e7ff; }
        
        .instruction { background: #fef9e6; border-radius: 12px; padding: 0.3rem; font-size: 0.5rem; text-align: center; margin-top: 0.3rem; }
        .drive-instruction { background: #e0f2fe; border-radius: 10px; padding: 3px; font-size: 0.5rem; text-align: center; margin-top: 4px; flex-shrink: 0; }
        footer { text-align: center; padding: 0.2rem; font-size: 0.45rem; background: #dce5ec; flex-shrink: 0; }
        
        #zipCodeList::-webkit-scrollbar { width: 3px; }
        #zipCodeList::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        #zipCodeList::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 10px; }
        
        .selected-zip-info { background: #fef3c7; padding: 0.2rem; border-radius: 10px; margin-top: 4px; font-size: 0.55rem; text-align: center; flex-shrink: 0; }
        .clear-boundary-btn { background: #e74c3c; color: white; border: none; border-radius: 16px; padding: 0.15rem 0.5rem; font-size: 0.5rem; cursor: pointer; margin-left: 6px; }
        
        @media (max-width: 700px) { .main-container { flex-direction: column; gap: 0.4rem; padding: 0.4rem; } .map-wrapper { flex: 0 0 42%; min-height: 240px; } .route-info { max-width: 100%; white-space: normal; font-size: 0.55rem; } .route-selectors { flex-wrap: wrap; } }
        @media (min-width: 1200px) { .header h1 { font-size: 1.2rem; } .zip-badge { font-size: 0.6rem; padding: 0.2rem 0.55rem; } }
        
        .route-loading { display: inline-block; width: 12px; height: 12px; border: 2px solid #f3f3f3; border-top: 2px solid #f39c12; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="header">
    <h1><span>🗺️ ZIP Codes Florida</span><span style="font-size:0.5rem;">🗺️ Territorios</span></h1>
    <div class="route-controls">
        <div class="route-selectors">
            <select id="originSelect"><option value="">📍 Origen A</option></select>
            <select id="destinySelect"><option value="">📍 Destino B</option></select>
            <button id="calcRouteBtn">🚗 Ruta</button>
            <button id="swapBtn">🔄 Swap</button>
            <button id="clearAllBtn" class="clear-btn">🗑️ Limpiar todo</button>
        </div>
        <div class="route-info" id="routeInfo">🚗 Selecciona A y B</div>
    </div>
</div>

<div class="main-container">
    <div class="map-wrapper"><div id="map"></div></div>
    <div class="results-panel">
        <div class="info-card">
            <h3><span>📮 Códigos ZIP</span><span>🗺️ Toque → Territorio</span></h3>
            <div id="zipCodeList"><div class="instruction">⏳ Cargando...</div></div>
            <div id="selectedZipInfo" class="selected-zip-info">💡 Toque un ZIP para ver su territorio</div>
            <div class="drive-instruction">🚗 Toque un ZIP → territorio | También como origen/destino</div>
        </div>
    </div>
</div>
<footer>📬 Cada ZIP tiene su TERRITORIO (límite postal) | Botón "Limpiar todo" elimina ruta y territorio</footer>

<script>
(function() {
    // ========== CONFIGURACIÓN INICIAL ==========
    const map = L.map('map', { preferCanvas: true }).setView([28.2, -81.4], 7.5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', maxZoom: 18 }).addTo(map);
    L.control.scale({ metric: true, imperial: true, position: 'bottomleft' }).addTo(map);
    
    // Variables
    let currentRouteLayer = null, currentOriginMarker = null, currentDestinyMarker = null;
    let selectedOrigin = null, selectedDestiny = null, currentBoundaryLayer = null;
    let currentSelectedZip = null;
    const zipMarkers = [];
    
    // Colores por área
    const colores = { "352": "#E67E22", "904": "#2C7DA0", "321": "#2ECC71", "772": "#E74C3C", "772/561": "#9B59B6" };
    
    // ========== TERRITORIOS (POLÍGONOS) ==========
    const territorios = {
        "34470": [[29.22,-82.18],[29.22,-82.10],[29.15,-82.10],[29.15,-82.18]],
        "34471": [[29.21,-82.16],[29.21,-82.12],[29.17,-82.12],[29.17,-82.16]],
        "34472": [[29.20,-82.14],[29.20,-82.08],[29.14,-82.08],[29.14,-82.14]],
        "34474": [[29.22,-82.19],[29.22,-82.14],[29.18,-82.14],[29.18,-82.19]],
        "32202": [[30.36,-81.68],[30.36,-81.63],[30.30,-81.63],[30.30,-81.68]],
        "32204": [[30.35,-81.69],[30.35,-81.66],[30.32,-81.66],[30.32,-81.69]],
        "32207": [[30.33,-81.66],[30.33,-81.62],[30.29,-81.62],[30.29,-81.66]],
        "32209": [[30.39,-81.70],[30.39,-81.66],[30.35,-81.66],[30.35,-81.70]],
        "32901": [[28.12,-80.64],[28.12,-80.58],[28.05,-80.58],[28.05,-80.64]],
        "32931": [[28.35,-80.63],[28.35,-80.59],[28.29,-80.59],[28.29,-80.63]],
        "32960": [[27.67,-80.43],[27.67,-80.37],[27.61,-80.37],[27.61,-80.43]],
        "34952": [[27.30,-80.39],[27.30,-80.34],[27.25,-80.34],[27.25,-80.39]],
        "34994": [[27.22,-80.28],[27.22,-80.23],[27.17,-80.23],[27.17,-80.28]],
        "33455": [[27.09,-80.17],[27.09,-80.12],[27.04,-80.12],[27.04,-80.17]]
    };
    
    function obtenerTerritorio(zip, lat, lng) {
        if (territorios[zip]) return territorios[zip];
        const off = 0.045;
        return [[lat+off, lng-off], [lat+off, lng+off], [lat-off, lng+off], [lat-off, lng-off]];
    }
    
    function limpiarTerritorio() {
        if (currentBoundaryLayer) { map.removeLayer(currentBoundaryLayer); currentBoundaryLayer = null; }
        currentSelectedZip = null;
    }
    
    function mostrarTerritorio(zipInfo) {
        limpiarTerritorio();
        const coords = obtenerTerritorio(zipInfo.zip, zipInfo.lat, zipInfo.lng);
        currentBoundaryLayer = L.polygon(coords, {
            color: zipInfo.color, weight: 2.5, fillColor: zipInfo.color, fillOpacity: 0.15, dashArray: '4, 4'
        }).addTo(map);
        currentBoundaryLayer.bindPopup(`<b>📬 ${zipInfo.zip}</b><br>📍 ${zipInfo.city}<br>🗺️ TERRITORIO POSTAL`);
        currentSelectedZip = zipInfo;
        document.getElementById('selectedZipInfo').innerHTML = `📍 <strong>${zipInfo.zip}</strong> - ${zipInfo.city}<br>🗺️ Territorio visible<br><button id="clearBtn" style="background:#e74c3c; color:white; border:none; border-radius:12px; padding:0.1rem 0.5rem; font-size:0.5rem; margin-top:2px;">🗑️ Ocultar territorio</button>`;
        const btn = document.getElementById('clearBtn');
        if (btn) btn.onclick = () => { limpiarTerritorio(); document.getElementById('selectedZipInfo').innerHTML = '💡 Territorio ocultado - Toque otro ZIP'; };
        map.fitBounds(currentBoundaryLayer.getBounds(), { padding: [30, 30] });
        currentBoundaryLayer.openPopup();
    }
    
    // ========== FUNCIÓN LIMPIAR TODO ==========
    function limpiarTodo() {
        // Limpiar ruta
        if (currentRouteLayer) { map.removeLayer(currentRouteLayer); currentRouteLayer = null; }
        if (currentOriginMarker) { map.removeLayer(currentOriginMarker); currentOriginMarker = null; }
        if (currentDestinyMarker) { map.removeLayer(currentDestinyMarker); currentDestinyMarker = null; }
        
        // Limpiar territorio
        limpiarTerritorio();
        
        // Limpiar selecciones
        selectedOrigin = null;
        selectedDestiny = null;
        
        // Limpiar selects
        document.getElementById('originSelect').value = '';
        document.getElementById('destinySelect').value = '';
        
        // Limpiar información
        document.getElementById('routeInfo').innerHTML = '🚗 Todo limpiado - Selecciona A y B';
        document.getElementById('selectedZipInfo').innerHTML = '💡 Todo limpiado - Toque un ZIP para ver su territorio';
        
        // Volver a vista normal de Florida
        map.setView([28.2, -81.4], 7.5);
        
        // Notificación rápida
        const toast = document.createElement('div');
        toast.textContent = '🗑️ Todo limpiado: ruta, territorio y selecciones';
        toast.style.cssText = 'position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:#2c3e2f; color:white; padding:4px 12px; border-radius:20px; font-size:0.6rem; z-index:2000; pointer-events:none; opacity:0.9;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ========== DATOS (compactos) ==========
    const ciudades = [
        { n: "Ocala", ac: "352", c: "#E67E22", z: [
            { z: "34470", lt: 29.1872, ln: -82.1401 }, { z: "34471", lt: 29.1800, ln: -82.1300 },
            { z: "34472", lt: 29.1700, ln: -82.1000 }, { z: "34474", lt: 29.1950, ln: -82.1500 },
            { z: "34475", lt: 29.2100, ln: -82.1600 }, { z: "34476", lt: 29.1600, ln: -82.1200 }
        ]},
        { n: "Jacksonville", ac: "904", c: "#2C7DA0", z: [
            { z: "32202", lt: 30.3322, ln: -81.6557 }, { z: "32204", lt: 30.3400, ln: -81.6700 },
            { z: "32207", lt: 30.3100, ln: -81.6300 }, { z: "32209", lt: 30.3600, ln: -81.6900 },
            { z: "32210", lt: 30.2700, ln: -81.7200 }, { z: "32216", lt: 30.2600, ln: -81.5500 }
        ]},
        { n: "Space Coast", ac: "321", c: "#2ECC71", z: [
            { z: "32901", lt: 28.0836, ln: -80.6081 }, { z: "32931", lt: 28.3200, ln: -80.6075 },
            { z: "32934", lt: 28.1400, ln: -80.6900 }, { z: "32935", lt: 28.1500, ln: -80.6400 },
            { z: "32905", lt: 28.0345, ln: -80.5887 }, { z: "32907", lt: 28.0200, ln: -80.6000 }
        ]},
        { n: "Treasure Coast", ac: "772", c: "#E74C3C", z: [
            { z: "32960", lt: 27.6386, ln: -80.3973 }, { z: "34945", lt: 27.4600, ln: -80.3700 },
            { z: "34952", lt: 27.2730, ln: -80.3582 }, { z: "34953", lt: 27.2500, ln: -80.3800 },
            { z: "34983", lt: 27.2900, ln: -80.3900 }, { z: "34994", lt: 27.1975, ln: -80.2528 }
        ]},
        { n: "Stuart/Hobe", ac: "772/561", c: "#9B59B6", z: [
            { z: "34996", lt: 27.2100, ln: -80.2300 }, { z: "33455", lt: 27.0595, ln: -80.1366 },
            { z: "33475", lt: 27.0400, ln: -80.1200 }, { z: "34990", lt: 27.1400, ln: -80.2000 }
        ]}
    ];
    
    const allZips = [];
    for (const city of ciudades) {
        for (const zip of city.z) {
            allZips.push({ zip: zip.z, lat: zip.lt, lng: zip.ln, city: city.n, color: city.c, areaCode: city.ac });
        }
    }
    
    // ========== RUTA (con cache) ==========
    let routeCache = new Map();
    
    async function calcularRuta(orLat, orLng, destLat, destLng, orZip, destZip) {
        if (currentRouteLayer) map.removeLayer(currentRouteLayer);
        if (currentOriginMarker) map.removeLayer(currentOriginMarker);
        if (currentDestinyMarker) map.removeLayer(currentDestinyMarker);
        
        const cacheKey = `${orLat},${orLng}|${destLat},${destLng}`;
        const originIcon = L.divIcon({ html: `<div style="background:#2ECC71; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; font-size:8px; font-weight:bold;">A<br>${orZip}</div>`, iconSize: [30,30] });
        const destinyIcon = L.divIcon({ html: `<div style="background:#E74C3C; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; font-size:8px; font-weight:bold;">B<br>${destZip}</div>`, iconSize: [30,30] });
        
        currentOriginMarker = L.marker([orLat, orLng], { icon: originIcon }).addTo(map);
        currentDestinyMarker = L.marker([destLat, destLng], { icon: destinyIcon }).addTo(map);
        
        const routeDiv = document.getElementById('routeInfo');
        routeDiv.innerHTML = `<span class="route-loading"></span> Calculando...`;
        
        try {
            let data = routeCache.get(cacheKey);
            if (!data) {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${orLng},${orLat};${destLng},${destLat}?overview=full&geometries=geojson`);
                data = await res.json();
                if (data.code === 'Ok') routeCache.set(cacheKey, data);
            }
            if (data && data.code === 'Ok' && data.routes.length) {
                const route = data.routes[0];
                const dist = (route.distance / 1000).toFixed(1);
                const mins = Math.round(route.duration / 60);
                const hours = Math.floor(mins / 60);
                const time = hours > 0 ? `${hours}h ${mins % 60}min` : `${mins}min`;
                currentRouteLayer = L.geoJSON(route.geometry, { style: { color: '#f39c12', weight: 5 } }).addTo(map);
                routeDiv.innerHTML = `🚗 <span>${orZip}</span> → <span>${destZip}</span> | 📏 ${dist} km | ⏱️ ${time}`;
                map.fitBounds(currentRouteLayer.getBounds(), { padding: [40, 40] });
            } else routeDiv.innerHTML = `❌ Ruta no disponible`;
        } catch(e) { routeDiv.innerHTML = `❌ Error`; }
    }
    
    function swapRoute() {
        if (selectedOrigin && selectedDestiny) {
            [selectedOrigin, selectedDestiny] = [selectedDestiny, selectedOrigin];
            document.getElementById('originSelect').value = `${selectedOrigin.zip}|${selectedOrigin.lat}|${selectedOrigin.lng}|${selectedOrigin.city}`;
            document.getElementById('destinySelect').value = `${selectedDestiny.zip}|${selectedDestiny.lat}|${selectedDestiny.lng}|${selectedDestiny.city}`;
            calcularRuta(selectedOrigin.lat, selectedOrigin.lng, selectedDestiny.lat, selectedDestiny.lng, selectedOrigin.zip, selectedDestiny.zip);
        } else alert('⚠️ Selecciona Origen y Destino');
    }
    
    // ========== UI ==========
    function updateSelects() {
        const originSel = document.getElementById('originSelect');
        const destSel = document.getElementById('destinySelect');
        let opts = '<option value="">📍 Origen A</option>', optsD = '<option value="">📍 Destino B</option>';
        for (const z of allZips) {
            opts += `<option value="${z.zip}|${z.lat}|${z.lng}|${z.city}">🚗 ${z.zip} - ${z.city}</option>`;
            optsD += `<option value="${z.zip}|${z.lat}|${z.lng}|${z.city}">🚗 ${z.zip} - ${z.city}</option>`;
        }
        originSel.innerHTML = opts;
        destSel.innerHTML = optsD;
    }
    
    function renderLista() {
        const container = document.getElementById('zipCodeList');
        let html = '';
        for (const city of ciudades) {
            const sorted = [...city.z].sort((a,b) => a.z.localeCompare(b.z));
            html += `<div class="city-zip-section"><div class="city-header"><span class="city-color-dot" style="background:${city.c}"></span><span>🏙️ ${city.n} (${city.ac})</span></div><div class="zip-grid">`;
            for (const zip of sorted) {
                html += `<div class="zip-badge" style="background:${city.c}; color:white;" data-zip="${zip.z}" data-lat="${zip.lt}" data-lng="${zip.ln}" data-city="${city.n}" data-color="${city.c}">🗺️ ${zip.z}</div>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html + `<div class="instruction">✅ ${allZips.length} códigos ZIP</div>`;
        
        container.querySelectorAll('.zip-badge').forEach(el => {
            el.addEventListener('click', () => {
                const zip = el.dataset.zip, lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
                const city = el.dataset.city, color = el.dataset.color;
                const zipInfo = { zip, lat, lng, city, color };
                if (confirm(`📍 ${zip} - ${city}\n\n✓ OK = Ver territorio\n✗ Cancelar = Origen/Destino`)) {
                    mostrarTerritorio(zipInfo);
                } else {
                    if (confirm(`Usar ${zip} como:\n✓ OK = Origen (A)\n✗ Cancelar = Destino (B)`)) {
                        selectedOrigin = zipInfo;
                        document.getElementById('originSelect').value = `${zip}|${lat}|${lng}|${city}`;
                        document.getElementById('routeInfo').innerHTML = `📍 Origen: ${zip}`;
                    } else {
                        selectedDestiny = zipInfo;
                        document.getElementById('destinySelect').value = `${zip}|${lat}|${lng}|${city}`;
                        document.getElementById('routeInfo').innerHTML = `📍 Destino: ${zip}`;
                    }
                    if (selectedOrigin && selectedDestiny) calcularRuta(selectedOrigin.lat, selectedOrigin.lng, selectedDestiny.lat, selectedDestiny.lng, selectedOrigin.zip, selectedDestiny.zip);
                }
            });
        });
    }
    
    function dibujarMarcadores() {
        for (const zip of allZips) {
            const icon = L.divIcon({ html: `<div style="background:${zip.color}; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1.5px solid white; font-size:7px; font-weight:bold; color:white;">${zip.zip.slice(-2)}</div>`, iconSize: [22,22] });
            const marker = L.marker([zip.lat, zip.lng], { icon }).addTo(map);
            marker.on('click', () => {
                if (confirm(`📍 ${zip.zip} - ${zip.city}\n\n✓ OK = Ver territorio\n✗ Cancelar = Origen/Destino`)) {
                    mostrarTerritorio(zip);
                } else {
                    if (confirm(`Usar ${zip.zip} como:\n✓ OK = Origen (A)\n✗ Cancelar = Destino (B)`)) {
                        selectedOrigin = zip;
                        document.getElementById('originSelect').value = `${zip.zip}|${zip.lat}|${zip.lng}|${zip.city}`;
                    } else {
                        selectedDestiny = zip;
                        document.getElementById('destinySelect').value = `${zip.zip}|${zip.lat}|${zip.lng}|${zip.city}`;
                    }
                    if (selectedOrigin && selectedDestiny) calcularRuta(selectedOrigin.lat, selectedOrigin.lng, selectedDestiny.lat, selectedDestiny.lng, selectedOrigin.zip, selectedDestiny.zip);
                }
            });
            zipMarkers.push(marker);
        }
    }
    
    // Event listeners
    document.getElementById('originSelect')?.addEventListener('change', (e) => {
        if (e.target.value) { const p = e.target.value.split('|'); selectedOrigin = { zip: p[0], lat: parseFloat(p[1]), lng: parseFloat(p[2]), city: p[3] }; }
    });
    document.getElementById('destinySelect')?.addEventListener('change', (e) => {
        if (e.target.value) { const p = e.target.value.split('|'); selectedDestiny = { zip: p[0], lat: parseFloat(p[1]), lng: parseFloat(p[2]), city: p[3] };
        if (selectedOrigin && selectedDestiny) calcularRuta(selectedOrigin.lat, selectedOrigin.lng, selectedDestiny.lat, selectedDestiny.lng, selectedOrigin.zip, selectedDestiny.zip); }
    });
    document.getElementById('calcRouteBtn')?.addEventListener('click', () => {
        if (selectedOrigin && selectedDestiny) calcularRuta(selectedOrigin.lat, selectedOrigin.lng, selectedDestiny.lat, selectedDestiny.lng, selectedOrigin.zip, selectedDestiny.zip);
        else alert('⚠️ Selecciona Origen y Destino');
    });
    document.getElementById('swapBtn')?.addEventListener('click', swapRoute);
    document.getElementById('clearAllBtn')?.addEventListener('click', limpiarTodo);
    
    // Inicialización
    updateSelects();
    dibujarMarcadores();
    renderLista();
    
    const resize = () => setTimeout(() => map.invalidateSize(), 50);
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
})();
</script>
</body>
</html>
